# chiseledEnchants (Paper) configuration.
# Mirrors the mod's options. All chance/protection values are 0-1 fractions (0.5 = 50%).
# Edit and run /cench reload to apply.

# ── Guarantee strength ──
# Max-level books of an enchant for a 100% chance to land (ONLY max-level books count).
booksForFullChance: 6

# ── The special "Chiseled Enchanter" table ──
requireSpecialTable: true
specialTableName: "Chiseled Enchanter"
craftOnlyTable: true

# ── Economy (lapis GEMS on Paper) ──
# The Paper enchanting table takes lapis GEMS (a plugin can't widen the slot to blocks like the mod's
# mixin does), so these counts are GEMS. Same numbers as the mod: 14 to enchant, +up to 50 surplus gems
# for book protection (14 + 50 = a full 64-gem stack = 100% at 0.02/gem).
lapisCost: 14
costOfMaxEnchant: 10
bookConsumeChance: 0.5
bookProtectionEnabled: true
protectionPerBlock: 0.02
maxProtection: 1.0

# ── Rules ──
resolveConflicts: true
allowCurses: false
allowTreasureEnchants: true
allowBookEnchanting: false

# ── Scan geometry ──
scanRadius: 2
scanLayers: 2

# ── Guide book (anvil-rename trigger) ──
guideEnabled: true
guideKeyword: "chiseledEnchants"

# ── Per-enchant whitelist ──
# Add "namespace:key: false" entries to bar specific enchants. Anything not listed is allowed.
# e.g.  minecraft:mending: false
enchantWhitelist: {}

# ── Links (blank = hidden) ──
linkGithub: "https://github.com/LunixiaLIVE/chiseledEnchants"
linkModrinth: "https://modrinth.com/project/chiseledenchants"
linkCurseforge: ""
linkDiscord: ""
